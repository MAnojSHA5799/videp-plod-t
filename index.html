<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Plot Advertisement</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
color:white;
overflow:hidden;
}

#bg{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:brightness(0.6);
transition:background-image 1s ease-in-out;

}

#content{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:80%;

}

#text{

font-size:42px;
line-height:1.6;
font-weight:bold;
text-shadow:0px 2px 10px rgba(0,0,0,0.8);

}

button{

margin-top:40px;
padding:15px 40px;
font-size:20px;
background:#ff0055;
border:none;
color:white;
border-radius:8px;
cursor:pointer;

}

</style>
</head>

<body>

<div id="bg"></div>

<div id="content">

<div id="text">Start Advertisement</div>

<button onclick="startAd()">Play Ad</button>

</div>

<script>

const segments = [

{
text:"आई आई टी पटना बिहटा के पास ग्रेटर पटना में टाउनशिप में आवासीय जमीन खरीदने का सुनहरा अवसर",
image:"img1.jpg"
},

{
text:"तीन साल में निवेश दोगुना बायबैक पॉलिसी के साथ",
image:"img2.jpg"
},

{
text:"ग्रेटर पटना में निवेश करें मात्र बारह सौ निन्यानवे रुपये प्रति स्क्वायर फीट",
image:"img3.jpg"
},

{
text:"बिजली पानी और स्ट्रीट लाइट जैसी सभी सुविधाओं के साथ",
image:"img4.jpg"
},

{
text:"आज ही बुक करें अपना प्लॉट",
image:"img5.jpg"
}

]

let index = 0

function speak(text,callback){

const speech = new SpeechSynthesisUtterance(text)

speech.lang = "hi-IN"

speech.rate = 0.8
speech.pitch = -0.5
speech.volume = 1

const voices = speechSynthesis.getVoices()

const hindiVoice = voices.find(v => v.lang.includes("hi"))

if(hindiVoice){

speech.voice = hindiVoice

}

speech.onend = callback

speechSynthesis.cancel()

speechSynthesis.speak(speech)

}

function playSegment(){

if(index >= segments.length){

return

}

const data = segments[index]

document.getElementById("text").innerText = data.text

document.getElementById("bg").style.backgroundImage = `url(${data.image})`

speak(data.text, () => {

index++

setTimeout(() => {

playSegment()

},500)

})

}

function startAd(){

index = 0

playSegment()

}

speechSynthesis.onvoiceschanged = () => {

speechSynthesis.getVoices()

}

</script>

</body>
</html>
