<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Plot Advertisement</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* DOUBLE BACKGROUND LAYERS */
.bgLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
filter:brightness(0.6);
transition:opacity 1s ease-in-out;
}

#bg1{ z-index:-2; opacity:1; }
#bg2{ z-index:-1; opacity:0; }

#content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:80%;
}

#text{
font-size:42px;
line-height:1.6;
font-weight:bold;
text-shadow:0px 2px 10px rgba(0,0,0,0.8);
}

/* Timer + Button */
#controlBox{
position:fixed;
bottom:20px;
right:20px;
display:flex;
align-items:center;
gap:10px;
}

#timer{
font-size:18px;
background:rgba(0,0,0,0.5);
padding:10px 15px;
border-radius:6px;
}

#toggleBtn{
padding:10px 20px;
font-size:16px;
background:#ff0055;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#leadForm{
display:none;
margin-top:40px;
}

#leadForm input,
#leadForm select{
padding:12px;
width:300px;
font-size:16px;
border-radius:6px;
border:none;
margin-top:10px;
}

#leadForm button{
background:#00c853;
}

#thankyou{
display:none;
font-size:24px;
margin-top:20px;
color:#00ff95;
}

</style>
</head>

<body>

<!-- DOUBLE BACKGROUND -->
<div id="bg1" class="bgLayer"></div>
<div id="bg2" class="bgLayer"></div>

<div id="content">

<div id="text">Start Advertisement</div>

<div id="leadForm">

<h2>अपना प्लॉट बुक करने के लिए जानकारी भरें</h2>

<input type="text" id="name" placeholder="आपका नाम"><br>
<input type="tel" id="mobile" placeholder="मोबाइल नंबर"><br>
<input type="text" id="district" placeholder="जिला (District)"><br>

<select id="investment">
<option value="">कितना निवेश करना चाहते हैं</option>
<option>₹1 लाख - ₹3 लाख</option>
<option>₹3 लाख - ₹5 लाख</option>
<option>₹5 लाख - ₹10 लाख</option>
<option>₹10 लाख से ज्यादा</option>
</select><br>

<select id="plotSize">
<option value="">प्लॉट साइज चुनें</option>
<option>600 sqft</option>
<option>800 sqft</option>
<option>1000 sqft</option>
<option>1500 sqft</option>
</select><br>

<button onclick="submitForm()">Submit</button>

<div id="thankyou">
धन्यवाद! हमारी टीम आपसे जल्द संपर्क करेगी।
</div>

</div>

</div>

<!-- Timer + Button -->
<div id="controlBox">
<div id="timer">0 sec</div>
<button id="toggleBtn" onclick="toggleAd()">▶ Play</button>
</div>

<audio id="music" loop>
<source src="bgmusic1.mp3" type="audio/mp3">
</audio>

<script>

// NUMBER → HINDI WORDS
function numberToWords(num){
const map={"0":"शून्य","1":"एक","2":"दो","3":"तीन","4":"चार","5":"पांच","6":"छह","7":"सात","8":"आठ","9":"नौ"}
return num.split("").map(d=>map[d]).join(" ")
}

const phoneNumber="6203844919"
const spokenNumber=numberToWords(phoneNumber)

// SEGMENTS
const segments=[

{
text:"आई आई टी पटना, बिहटा के पास ग्रेटर पटना में विकसित हो रही टाउनशिप में आवासीय जमीन खरीदने का शानदार अवसर। भविष्य के लिए सुरक्षित निवेश।",
image:"image/11.jpg"
},

{
text:"यहां निवेश करने पर तीन साल में निवेश दोगुना हो जाएगा, और सुरक्षित बायबैक पॉलिसी की सुविधा भी।",
image:"image/12.jpg"
},

{
text:"ग्रेटर पटना के तेजी से विकसित इलाके में मात्र 1299 रुपये प्रति स्क्वायर फीट में अपना प्लॉट खरीदने का शानदार मौका।",
image:"image/13.jpg"
},

{
text:"यहां बिजली, पानी, चौड़ी सड़कें और स्ट्रीट लाइट जैसी सभी आधुनिक सुविधाएं उपलब्ध हैं।",
image:"image/14.jpg"
},

{
    
        text:`तो देर किस बात की। आज ही अपना प्लॉट बुक करें और ग्रेटर पटना के उज्ज्वल भविष्य का हिस्सा बनें। संपर्क करें: ${phoneNumber}`,
        voiceText:`तो देर किस बात की। आज ही अपना प्लॉट बुक करें और ग्रेटर पटना के उज्ज्वल भविष्य का हिस्सा बनें। संपर्क करें: ${spokenNumber}`,
image:"image/17.jpg"
}

]

// PRELOAD IMAGES
const preloadedImages=[]
segments.forEach(seg=>{
const img=new Image()
img.src=seg.image
preloadedImages.push(img)
})

let index=0,seconds=0,timerInterval
let isPaused=true
let isStarted=false
let currentBg=1

// SMOOTH BACKGROUND SWITCH
function changeBackground(image){
const bg1=document.getElementById("bg1")
const bg2=document.getElementById("bg2")

if(currentBg===1){
bg2.style.backgroundImage=`url(${image})`
bg2.style.opacity=1
bg1.style.opacity=0
currentBg=2
}else{
bg1.style.backgroundImage=`url(${image})`
bg1.style.opacity=1
bg2.style.opacity=0
currentBg=1
}
}

// SPEECH
function speak(text,callback){
if(isPaused) return

const speech=new SpeechSynthesisUtterance(text)
speech.lang="hi-IN"

speech.onend=()=>{
if(!isPaused) callback()
}

speechSynthesis.cancel()
speechSynthesis.speak(speech)
}

// PLAY SEGMENT
function playSegment(){

if(isPaused) return

if(index>=segments.length){
clearInterval(timerInterval)
document.getElementById("leadForm").style.display="block"
document.getElementById("text").innerText="अभी जानकारी भरें और अपना प्लॉट बुक करें"
return
}

const data=segments[index]

document.getElementById("text").innerText=data.text
changeBackground(data.image)

speak(data.voiceText||data.text,()=>{
if(!isPaused){
index++
setTimeout(playSegment,500)
}
})
}

// START
function startAd(){

index=0
seconds=0
isPaused=false
isStarted=true

document.getElementById("leadForm").style.display="none"

const music=document.getElementById("music")
music.volume=0.17
music.currentTime=0
music.play()

timerInterval=setInterval(()=>{
seconds++
document.getElementById("timer").innerText=seconds+" sec"
},1000)

playSegment()
}

// TOGGLE
function toggleAd(){

const btn=document.getElementById("toggleBtn")

if(!isStarted){
startAd()
btn.innerText="⏸ Pause"
return
}

if(!isPaused){
isPaused=true
speechSynthesis.pause()
document.getElementById("music").pause()
clearInterval(timerInterval)
btn.innerText="▶ Play"
}else{
isPaused=false
speechSynthesis.resume()
document.getElementById("music").play()

timerInterval=setInterval(()=>{
seconds++
document.getElementById("timer").innerText=seconds+" sec"
},1000)

btn.innerText="⏸ Pause"
playSegment()
}
}

// FORM
function submitForm(){
document.getElementById("thankyou").style.display="block"
}

</script>

</body>
</html>
