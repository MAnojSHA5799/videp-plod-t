<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Plot Advertisement</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
color:white;
overflow:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
filter:brightness(0.6);
transition:background-image 1s ease-in-out;
}

#content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:80%;
}

#text{
font-size:42px;
line-height:1.6;
font-weight:bold;
text-shadow:0px 2px 10px rgba(0,0,0,0.8);
}

button{
margin-top:40px;
padding:15px 40px;
font-size:20px;
background:#ff0055;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

#timer{
position:fixed;
bottom:20px;
right:20px;
font-size:20px;
background:rgba(0,0,0,0.5);
padding:10px 15px;
border-radius:6px;
}

#leadForm{
display:none;
margin-top:40px;
}

#leadForm input,
#leadForm select{
padding:12px;
width:300px;
font-size:16px;
border-radius:6px;
border:none;
margin-top:10px;
}

#leadForm button{
background:#00c853;
}

#thankyou{
display:none;
font-size:26px;
margin-top:20px;
color:#00ff95;
}

</style>
</head>

<body>

<div id="bg"></div>

<div id="content">

<div id="text">Start Advertisement</div>

<button onclick="startAd()">Play Ad</button>

<div id="leadForm">

<h2>अपना प्लॉट बुक करने के लिए जानकारी भरें</h2>

<input type="text" id="name" placeholder="आपका नाम"><br>

<input type="tel" id="mobile" placeholder="मोबाइल नंबर"><br>

<input type="text" id="district" placeholder="जिला (District)"><br>

<select id="investment">
<option value="">कितना निवेश करना चाहते हैं</option>
<option>₹1 लाख - ₹3 लाख</option>
<option>₹3 लाख - ₹5 लाख</option>
<option>₹5 लाख - ₹10 लाख</option>
<option>₹10 लाख से ज्यादा</option>
</select><br>

<select id="plotSize">
<option value="">प्लॉट साइज चुनें</option>
<option>600 sqft</option>
<option>800 sqft</option>
<option>1000 sqft</option>
<option>1500 sqft</option>
</select><br>

<button onclick="submitForm()">Submit</button>

<div id="thankyou">
धन्यवाद! हमारी टीम आपसे जल्द संपर्क करेगी।
</div>

</div>

</div>

<div id="timer">0 sec</div>

<audio id="music" loop>
<source src="bgmusic1.mp3" type="audio/mp3">
</audio>

<script>

// ✅ NUMBER → HINDI DIGIT WORDS
function numberToWords(num) {
  const map = {
    "0": "शून्य",
    "1": "एक",
    "2": "दो",
    "3": "तीन",
    "4": "चार",
    "5": "पांच",
    "6": "छह",
    "7": "सात",
    "8": "आठ",
    "9": "नौ"
  };
  return num.split("").map(d => map[d]).join(" ");
}

const phoneNumber = "6203844919"
const spokenNumber = numberToWords(phoneNumber)

// ✅ AD SEGMENTS
const segments = [

{
text:"आई आई टी पटना, बिहटा के पास ग्रेटर पटना में विकसित हो रही टाउनशिप में आवासीय जमीन खरीदने का शानदार अवसर। भविष्य के लिए सुरक्षित निवेश।",
image:"https://images.unsplash.com/photo-1500382017468-9049fed747ef"
},

{
text:"यहां निवेश करने पर तीन साल में निवेश दोगुना हो जाएगा, और सुरक्षित बायबैक पॉलिसी की सुविधा भी।",
image:"https://images.unsplash.com/photo-1560518883-ce09059eeffa"
},

{
text:"ग्रेटर पटना के तेजी से विकसित इलाके में मात्र 1299 रुपये प्रति स्क्वायर फीट में अपना प्लॉट खरीदने का शानदार मौका।",
image:"https://images.unsplash.com/photo-1501183638710-841dd1904471"
},

{
text:"यहां बिजली, पानी, चौड़ी सड़कें और स्ट्रीट लाइट जैसी सभी आधुनिक सुविधाएं उपलब्ध हैं।",
image:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c"
},

// ✅ FINAL SEGMENT (DISPLAY vs VOICE अलग)
{
text:`तो देर किस बात की। आज ही अपना प्लॉट बुक करें और ग्रेटर पटना के उज्ज्वल भविष्य का हिस्सा बनें। संपर्क करें: ${phoneNumber}`,
voiceText:`तो देर किस बात की। आज ही अपना प्लॉट बुक करें और ग्रेटर पटना के उज्ज्वल भविष्य का हिस्सा बनें। संपर्क करें: ${spokenNumber}`,
image:"https://images.unsplash.com/photo-1600585154154-7121a6b0b8c7"
}

]

let index = 0
let seconds = 0
let timerInterval

// ✅ SPEAK FUNCTION
function speak(text,callback){

const speech = new SpeechSynthesisUtterance(text)

speech.lang = "hi-IN"
speech.rate = 1.05
speech.pitch = 1.05
speech.volume = 1

const voices = speechSynthesis.getVoices()
const hindiVoice = voices.find(v => v.lang.includes("hi"))

if(hindiVoice){
speech.voice = hindiVoice
}

speech.onend = callback

speechSynthesis.cancel()
speechSynthesis.speak(speech)

}

// ✅ PLAY SEGMENTS
function playSegment(){

if(index >= segments.length){

clearInterval(timerInterval)

document.getElementById("leadForm").style.display = "block"
document.getElementById("text").innerText = "अभी जानकारी भरें और अपना प्लॉट बुक करें"

return
}

const data = segments[index]

// 👉 Screen par normal text (digits)
document.getElementById("text").innerText = data.text

document.getElementById("bg").style.backgroundImage = `url(${data.image})`

// 👉 Voice ke liye alag text
const speakText = data.voiceText || data.text

speak(speakText, () => {
index++
setTimeout(()=>{ playSegment() },300)
})

}

// ✅ START AD
function startAd(){

index = 0
seconds = 0

document.getElementById("leadForm").style.display="none"

const music = document.getElementById("music")
music.volume = 0.17
music.currentTime = 0
music.play()

timerInterval = setInterval(()=>{
seconds++
document.getElementById("timer").innerText = seconds + " sec"
},1000)

playSegment()

}

// ✅ FORM SUBMIT
function submitForm(){

const name = document.getElementById("name").value
const mobile = document.getElementById("mobile").value
const district = document.getElementById("district").value
const investment = document.getElementById("investment").value
const plotSize = document.getElementById("plotSize").value

if(!name || !mobile){
alert("कृपया नाम और मोबाइल नंबर भरें")
return
}

console.log({
name,
mobile,
district,
investment,
plotSize
})

document.getElementById("thankyou").style.display="block"

}

</script>

</body>
</html>
